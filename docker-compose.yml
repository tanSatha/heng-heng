version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hengheng-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hengheng-backend
    restart: always
    ports:
      - "4000:3000"
    depends_on:
      - postgres
    env_file:
      - .env

  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: hengheng-frontend
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   env_file:
  #     - .env

volumes:
  pgdata:
